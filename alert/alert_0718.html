<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全线生产状态看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F3F0;
  --surface: #FFFFFF;
  --border: #E6E5E0;
  --border-light: #EFEEEA;
  --text: #1C1B1A;
  --text-secondary: #6B6A66;
  --text-muted: #A3A29E;
  --red: #C43A31;
  --amber: #C4872B;
  --green: #1B8A3D;
  --font: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;padding:32px 0}
.app{max-width:1050px;margin:0 auto;padding:0 20px}
.header{margin-bottom:24px}
.header h1{font-size:17px;font-weight:500;letter-spacing:-0.01em;color:var(--text);margin-bottom:3px}
.header .sub{font-size:12px;color:var(--text-muted);margin-bottom:10px}
.controls{display:flex;gap:8px;align-items:center;margin-bottom:24px;font-size:13px}
.controls input{flex:1;max-width:240px;padding:6px 10px;border:1px solid var(--border);border-radius:0;font-size:13px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none}
.controls input:focus{border-color:var(--text-secondary)}
.controls .filter-group{display:flex;gap:4px}
.controls .filter-btn{padding:5px 12px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;color:var(--text-secondary);font-family:var(--font)}
.controls .filter-btn.active{background:var(--text);color:var(--surface);border-color:var(--text)}
.controls .filter-btn:hover{border-color:var(--text-secondary)}
.controls .mode-btn{padding:4px 10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;color:var(--text-muted);font-family:var(--font)}
.controls .mode-btn.active{color:var(--text);border-color:var(--text)}
.controls .result-count{font-size:12px;color:var(--text-muted);margin-left:auto}
.stats-line{display:flex;gap:20px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border-light)}
.stat-value{font-size:27px;font-weight:450;letter-spacing:-0.03em;font-feature-settings:"tnum" 1}
.stat-value.red{color:var(--red)}
.stat-value.amber{color:var(--amber)}
.stat-value.green{color:var(--green)}
.stat-value.muted{color:var(--text-muted)}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:0}
.section{margin-bottom:28px}
.block{margin-bottom:12px;padding:8px 0;border-bottom:1px solid var(--border-light)}
.block:last-child{border-bottom:none}
.block-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.block-order{font-size:13px;font-weight:500;color:var(--text);font-feature-settings:"tnum" 1}
.block-meta{font-size:11.5px;color:var(--text-muted)}
.block-meta .due{color:var(--red)}
.order-table{width:100%;border-collapse:collapse;font-size:12px}
.order-table th{color:var(--text);font-weight:400;padding:3px 8px;text-align:right;font-size:10px;letter-spacing:0.3px;white-space:nowrap;width:0}
.order-table td{padding:3px 8px;text-align:right;font-feature-settings:"tnum" 1}
.order-table td:first-child{text-align:left;font-weight:450}
.order-table td:nth-child(2){color:var(--text-secondary);font-size:11px}
.order-table td:nth-child(3){color:var(--text-secondary);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
td.ship{color:var(--text-secondary);font-size:11px}
td.neg{color:var(--red);font-weight:450}
td.pos{color:var(--green);font-weight:450}
td.mute{color:var(--text-muted)}
.extra-hint{font-size:11px;color:var(--text-muted);padding:4px 0;text-align:center}
.dim{opacity:0.4}
.completed{font-size:12px;color:var(--text-muted);padding:12px 0 0;border-top:1px solid var(--border-light);margin-top:20px}
@media(max-width:640px){
body{padding:20px 0}
.stats-line{gap:12px;flex-wrap:wrap}
.stat-value{font-size:22px}
.controls{flex-wrap:wrap}
.controls input{max-width:100%}
}
</style>
</head>
<body>
<div class="app" id="app">
<div class="header">
    <h1>全线生产状态</h1>
    <div class="sub">2026-07-18</div>

    <div class="controls">
      <input type="text" id="search" placeholder="搜索订单号…" oninput="debounceRender()">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
        <button class="filter-btn" data-filter="delayed" onclick="setFilter('delayed')">延期</button>
        <button class="filter-btn" data-filter="risk" onclick="setFilter('risk')">风险</button>
        <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">已完成</button>
        <button class="filter-btn" data-filter="special" onclick="setFilter('special')">特殊</button>
        <span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>
        <button class="mode-btn" data-mode="compact" onclick="setMode('compact')">简洁</button>
        <button class="mode-btn active" data-mode="detail" onclick="setMode('detail')">详细</button>
      </div>
      <span class="result-count" id="count"></span>
    </div>
    <div style="font-size:10px;color:var(--text-muted);text-align:right;margin-top:4px">
      <span style="color:var(--green)">✓ 已完成</span>
      <span style="color:var(--red);margin-left:8px">● 未完成</span>
      <span style="color:var(--text-muted);margin-left:8px">计划日期</span>
      <span style="color:var(--text-muted);margin-left:8px">—</span> 无数据
    </div>
</div>

<div class="stats-line">
  <div class="stat"><div class="stat-value">101</div><div class="stat-label">订单总数</div></div>
  <div class="stat"><div class="stat-value red">19</div><div class="stat-label">延期</div></div>
  <div class="stat"><div class="stat-value amber">31</div><div class="stat-label">有风险</div></div>
  <div class="stat"><div class="stat-value muted">3</div><div class="stat-label">已完成</div></div>
  <div class="stat"><div class="stat-value" style="color:#7B8EA0">6</div><div class="stat-label">特殊</div></div>
</div>

<div id="orders"></div>

<div class="completed"><span style="color:var(--green)">✓</span> 已完成 (3单): M26-46, S26-06-01, S26-06-08</div>
</div>

let mode = 'detail';
let debounceTimer = null;
function debounceRender() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 150);
}

function setFilter(f) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  render();
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
  
  let filtered = DATA;
  if (filter !== 'all') filtered = filtered.filter(o => o.status_label === filter);
  if (q) filtered = filtered.filter(o => o.order_no.toLowerCase().includes(q));
  
  document.getElementById('count').textContent = filtered.length + ' 单';
  
  const html = filtered.map(o => {
    const dim = '';
    // 产品级背景色
    function productBg(p) {
      // 成品列=0 → 已完成，不标背景
      if (p.pkg_diff === 0) return '';
      var st = p.product_status;
      if (st === 'danger') return ' style="background:rgba(139,65,215,0.15)"';
      if (st === 'critical') return ' style="background:rgba(185,28,28,0.15)"';
      if (st === 'warning') return ' style="background:rgba(245,158,11,0.1)"';
      return '';
    }
    // === 简洁模式 ===
    if (mode === 'compact') {
      let rows = '';
      const ps = o.products || [];
      for (const p of ps) {
        const fd = (v) => {
          if (v === null || v === undefined) return '<td class="mute">—</td>';
          const n = Number(v);
          if (isNaN(n)) return '<td>' + v + '</td>';
          if (n < 0) return '<td class="neg">' + (Number.isInteger(n) ? n : n.toFixed(1)) + '</td>';
          if (n === 0) return '<td class="pos">0</td>';
          return '<td>' + (Number.isInteger(n) ? n : n.toFixed(1)) + '</td>';
        };
        const ship = (p.can_ship || '—').slice(0,10);
        const sc = p.product_status === 'danger' || p.product_status === 'critical' ? 'style="color:var(--red)"' : p.product_status === 'warning' ? 'style="color:var(--amber)"' : '';
        rows += '<tr' + productBg(p) + '><td>' + (p.model || '?') + '</td><td>' + (p.surface || '—') + '</td><td ' + sc + '>' + (p.current_step || '—') + '</td>' + fd(p.transit_diff) + fd(p.pvd_diff) + (p.pkg_diff === 0 ? '<td class="pos">0</td>' : '<td class="neg">' + (p.pkg_diff === null || p.pkg_diff === undefined ? '—' : (Number.isInteger(p.pkg_diff) ? p.pkg_diff : p.pkg_diff.toFixed(1))) + '</td>') + '<td class="ship">' + ship + '</td></tr>';
      }
      return '<div class="block' + dim + '"><div class="block-header"><div class="block-order">' + o.order_no + '</div><div class="block-meta">交期 <span class="due">' + (o.delivery || '—') + '</span></div></div><table class="order-table"><tr><th>产品</th><th>表面</th><th>当前工序</th><th>中转仓</th><th>PVD</th><th>成品</th><th>预计出货</th></tr>' + rows + '</table></div>';
    }
    
    // === 详细模式 ===
    const stepOrder = ['板材','镭射','平面打磨','内角磨','打毛刺','推砂','PVD','包装'];
    let rows = '';
    const ps = o.products || [];
    for (const p of ps) {
      const fd = (v) => {
        if (v === null || v === undefined) return '<td class="mute">—</td>';
        const n = Number(v);
        if (isNaN(n)) return '<td>' + v + '</td>';
        if (n < 0) return '<td class="neg">' + (Number.isInteger(n) ? n : n.toFixed(1)) + '</td>';
        if (n === 0) return '<td class="pos">0</td>';
        return '<td>' + (Number.isInteger(n) ? n : n.toFixed(1)) + '</td>';
      };
      const qty = p.qty || '';
      const ship = (p.can_ship || '—').slice(0,10);
      const sched = p.schedule || {};
      const sc = p.product_status === 'danger' || p.product_status === 'critical' ? 'style="color:var(--red)"' : p.product_status === 'warning' ? 'style="color:var(--amber)"' : '';
      
      let route = '—';
      const hasPvd = sched['PVD'] && sched['PVD'].实际;
      const hasSand = sched['喷砂'] && sched['喷砂'].实际;
      if (hasPvd && hasSand) route = 'D';
      else if (hasPvd) route = 'B';
      else route = 'A';
      
      let stepCells = '';
      for (const sn of stepOrder) {
        const st = sched[sn];
        if (!st) { stepCells += '<td class="mute">—</td>'; continue; }
        const act = (st.实际 || '').toString().slice(0,10);
        const done = st.实际 && st.实际 !== null && st.实际 !== 'None' && st.实际 !== '未完成';
        if (done && act) {
          stepCells += '<td style="color:var(--green);font-size:10.5px">✓ ' + act + '</td>';
        } else if (st.实际) {
          stepCells += '<td style="color:var(--red);font-size:10.5px">' + act + '</td>';
        } else if (st.预计) {
          const plan = st.预计.toString().slice(0,10);
          stepCells += '<td style="color:var(--text-muted);font-size:10px">' + plan + '</td>';
        } else {
          stepCells += '<td class="mute">—</td>';
        }
      }
      
      rows += '<tr' + productBg(p) + '><td>' + (p.model || '?') + '</td><td style="text-align:center">' + qty + '</td><td style="text-align:center;font-size:10px">' + route + '</td><td>' + (p.surface || '—') + '</td><td ' + sc + '>' + (p.current_step || '—') + '</td>' + fd(p.transit_diff) + fd(p.pvd_diff) + (p.pkg_diff === 0 ? '<td class="pos">0</td>' : '<td class="neg">' + (p.pkg_diff === null || p.pkg_diff === undefined ? '—' : (Number.isInteger(p.pkg_diff) ? p.pkg_diff : p.pkg_diff.toFixed(1))) + '</td>') + stepCells + '<td class="ship">' + ship + '</td></tr>';
    }
    return '<div class="block' + dim + '"><div class="block-header"><div class="block-order">' + o.order_no + '</div><div class="block-meta">交期 <span class="due">' + (o.delivery || '—') + '</span></div></div><table class="order-table" style="font-size:11px"><tr><th>产品</th><th>数量</th><th>路线</th><th>表面</th><th>当前工序</th><th>中转仓</th><th>PVD</th><th>成品</th><th>板材</th><th>镭射</th><th>平面打磨</th><th>内角磨</th><th>打毛刺</th><th>推砂</th><th>PVD</th><th>包装</th><th>交期</th></tr>' + rows + '</table></div>';
  }).join('');
  
  document.getElementById('orders').innerHTML = html || '<div style="color:var(--text-muted);padding:24px 0;text-align:center;font-size:13px">无匹配订单</div>';
